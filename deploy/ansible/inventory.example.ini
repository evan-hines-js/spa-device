# Copy to inventory.ini and edit. The builder is a Linux eBPF build host (BUILD.md
# toolchain); the gates are the protected hosts to cloak. The builder and gates may
# overlap, but a gate never needs the build toolchain — artifacts are shipped in.

[builder]
build-server ansible_host=10.0.0.59 ansible_user=ubuntu

[gates]
build-2 ansible_host=10.0.0.185 ansible_user=ubuntu spa_interface=ens18

[gates:vars]
# Where these gates reach the control plane, and the CA (on the control node) that
# signs its TLS. gate_token is per-gate and one-time — pass it with -e at run time.
argus_url=https://10.0.0.155:4001
argus_ca=~/lattice/work/dir/lattos/argus/priv/cert/argus-ca.pem
